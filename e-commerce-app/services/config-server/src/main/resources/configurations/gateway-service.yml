server:
  port: 8222

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            - id: customer-service
              uri: lb:http://CUSTOMER-SERVICE
              predicates:
                - Path=/api/v1/customers/**, /api/v1/customers
            - id: order-service
              uri: lb:http://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**, /api/v1/orders
            - id: order-lines-service
              uri: lb:http://ORDER-SERVICE
              predicates:
                - Path=/api/v1/order-lines/**, /api/v1/order-lines
            - id: product-service
              uri: lb:http://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/products/**, /api/v1/products
            - id: payment-service
              uri: lb:http://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**, /api/v1/payments

